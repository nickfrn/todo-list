<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List</title>
</head>

<body>
    <!-- Dialogs for updating lists and tasks -->
    <dialog id="createListDialog">
        <form>
            <label for="listName">List name:</label>
            <input type="text" name="listName" id="list-name">

            <button id="create-list-confirm">Confirm</button>
            <button id="create-list-cancel">Cancel</button>
        </form>
    </dialog>

    <dialog id="editListDialog">
        <form>
            <label for="newListName">New name:</label>
            <input type="text" name="newListName" id="new-list-name">

            <button id="edit-list-confirm">Confirm</button>
            <button id="edit-list-cancel">Cancel</button>
        </form>
    </dialog>

    <dialog id="createTaskDialog">
        <form>
            <label for="title">Title:</label>
            <input type="text" name="title" id="task-title" required>

            <label for="desc">Description:</label>
            <input type="text" name="desc" id="task-desc" required>

            <label for="priority">Priority:</label>
            <select name="priority" id="task-priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>

            <label for="date">Due date:</label>
            <input type="date" name="date" id="task-date" required>

            <button id="create-task-confirm">Confirm</button>
            <button id="create-task-cancel">Cancel</button>
        </form>
    </dialog>

    <div id="dashboard">
        <h1 id="logo">To-Do List</h1>

        <!-- TODO: Add back categories for upcoming tasks -->
        <!-- <div id="upcoming">
            <h2 class="upcoming-category">All tasks</h2>
            <h2 class="upcoming-category">Today</h2>
            <h2 class="upcoming-category">This Week</h2>
            <h2 class="upcoming-category">Completed</h2>
        </div> -->

        <div id="lists">
            <div id="list-title">
                <h2>My lists</h2>
                <img src="./assets/plus.png" alt="add list" class="icon small" id="add-list-modal">
            </div>

            <div id="lists-container"></div>
        </div>
    </div>

    <div id="main-container">
        <button id="add-task-btn">Add task</button>
        
        <div id="tasks-container"></div>
    </div>
</body>
</html>
